<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 320" role="img" aria-label="Freddo Ceremoniale tin">
  <defs>
    <linearGradient id="ceremTinBody" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#0a1810"/>
      <stop offset="0.18" stop-color="#0d1f15"/>
      <stop offset="0.5" stop-color="#14301f"/>
      <stop offset="0.82" stop-color="#0d1f15"/>
      <stop offset="1" stop-color="#08130c"/>
    </linearGradient>
    <linearGradient id="ceremTinLid" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#101e16"/>
      <stop offset="0.5" stop-color="#1a3525"/>
      <stop offset="1" stop-color="#0a1810"/>
    </linearGradient>
    <radialGradient id="ceremShadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#0d1f15" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#0d1f15" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Soft floor shadow -->
  <ellipse cx="120" cy="296" rx="78" ry="8" fill="url(#ceremShadow)"/>

  <!-- Lid top ellipse -->
  <ellipse cx="120" cy="44" rx="56" ry="9" fill="url(#ceremTinLid)"/>
  <!-- Lid side -->
  <rect x="64" y="44" width="112" height="14" fill="url(#ceremTinLid)"/>
  <!-- Lid bottom edge highlight -->
  <ellipse cx="120" cy="58" rx="56" ry="3" fill="#0a1810" opacity="0.55"/>

  <!-- Tin body -->
  <rect x="60" y="58" width="120" height="232" rx="3" fill="url(#ceremTinBody)"/>

  <!-- Subtle vertical highlight running down the tin (matte sheen) -->
  <rect x="76" y="62" width="2" height="224" fill="#1a3525" opacity="0.5"/>

  <!-- Label rectangle -->
  <rect x="76" y="132" width="88" height="106" rx="2" fill="#fbf7ec"/>
  <!-- Inner hairline -->
  <rect x="80" y="136" width="80" height="98" rx="1" fill="none" stroke="#0d1f15" stroke-opacity="0.12" stroke-width="0.6"/>

  <!-- Wordmark on label -->
  <text x="120" y="166" text-anchor="middle"
        font-family="Fraunces, 'Iowan Old Style', 'Times New Roman', serif"
        font-size="13" letter-spacing="-0.01em" fill="#0d1f15">Freddo</text>
  <text x="120" y="186" text-anchor="middle"
        font-family="Fraunces, 'Iowan Old Style', 'Times New Roman', serif"
        font-size="13" letter-spacing="-0.01em" fill="#0d1f15">Matcha</text>

  <!-- Divider -->
  <line x1="92" y1="198" x2="148" y2="198" stroke="#0d1f15" stroke-opacity="0.4" stroke-width="0.5"/>

  <!-- Grade in italic -->
  <text x="120" y="212" text-anchor="middle"
        font-family="Fraunces, 'Iowan Old Style', 'Times New Roman', serif"
        font-size="10" font-style="italic" fill="#0d1f15" opacity="0.85">Ceremoniale</text>

  <!-- Proof zone -->
  <text x="120" y="225" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif"
        font-size="5" letter-spacing="0.22em" fill="#2c5a36">SINGLE-ORIGIN · JAPAN</text>

  <!-- Bottom green accent dot (mirrors brand mark) -->
  <circle cx="120" cy="270" r="2.5" fill="#95b067"/>
</svg>
