<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280" role="img" aria-label="Origin — Japan (single-origin marker)">
  <!-- Editorial abstraction of the Japanese archipelago.
       Specific prefecture / farm dot lands when supplier is locked (see design-spec-graphics.md). -->
  <g fill="#0d1f15" fill-opacity="0.92">
    <!-- Hokkaido -->
    <path d="M 178 28 Q 214 18 222 50 Q 226 78 196 82 Q 168 84 168 58 Z" />

    <!-- Honshu — long arc -->
    <path d="M 170 90
             Q 185 96 180 116
             Q 170 144 150 162
             Q 128 182 108 198
             Q 88 214 72 232
             Q 60 246 56 258
             Q 70 252 92 240
             Q 116 224 138 200
             Q 162 172 178 138
             Q 188 114 180 92 Z" />

    <!-- Shikoku -->
    <path d="M 82 240 Q 96 234 102 244 Q 98 252 82 250 Z" />

    <!-- Kyushu -->
    <path d="M 42 244 Q 58 234 64 258 Q 60 276 36 272 Q 30 258 42 244 Z" />
  </g>

  <!-- Single-origin pin — generic position over Honshu until supplier locks -->
  <g>
    <circle cx="130" cy="164" r="14" fill="#95b067" fill-opacity="0.22"/>
    <circle cx="130" cy="164" r="5" fill="#6f9342"/>
    <circle cx="130" cy="164" r="2" fill="#fbf7ec"/>
  </g>

  <!-- Inter caption -->
  <text
    x="120"
    y="20"
    text-anchor="middle"
    font-family="Inter, 'Avenir Next', 'Segoe UI', system-ui, sans-serif"
    font-size="9"
    letter-spacing="0.28em"
    fill="#2c5a36"
  >SINGLE-ORIGIN · JAPAN</text>
</svg>
