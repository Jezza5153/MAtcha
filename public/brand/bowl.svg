<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="Ceramic chawan with whisked matcha">
  <defs>
    <linearGradient id="bowlBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a89e89"/>
      <stop offset="0.35" stop-color="#d8d0bf"/>
      <stop offset="0.7" stop-color="#a89e89"/>
      <stop offset="1" stop-color="#5a4f3a"/>
    </linearGradient>
    <radialGradient id="bowlInterior" cx="0.5" cy="0.45" r="0.5">
      <stop offset="0" stop-color="#3f7242"/>
      <stop offset="0.4" stop-color="#2c5a36"/>
      <stop offset="0.85" stop-color="#1d4329"/>
      <stop offset="1" stop-color="#14301f"/>
    </radialGradient>
    <radialGradient id="foam" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#b9cc91" stop-opacity="0.9"/>
      <stop offset="0.4" stop-color="#95b067" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#6f9342" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="floorShadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#0d1f15" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#0d1f15" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rimHighlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbf7ec" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#fbf7ec" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Floor shadow -->
  <ellipse cx="400" cy="700" rx="280" ry="22" fill="url(#floorShadow)"/>

  <!-- Bowl outer body — hand-thrown chawan silhouette -->
  <path d="M 180 320
           Q 200 280 240 270
           L 560 270
           Q 600 280 620 320
           L 620 480
           Q 620 580 560 640
           Q 500 680 400 685
           Q 300 680 240 640
           Q 180 580 180 480 Z"
        fill="url(#bowlBody)"/>

  <!-- Bowl interior (oval ellipse showing matcha) -->
  <ellipse cx="400" cy="320" rx="220" ry="50" fill="url(#bowlInterior)"/>

  <!-- Whisked-matcha foam on top — concentric uneven discs -->
  <ellipse cx="400" cy="320" rx="200" ry="44" fill="url(#foam)" opacity="0.85"/>
  <ellipse cx="400" cy="316" rx="160" ry="32" fill="#d6e3b8" opacity="0.32"/>
  <ellipse cx="385" cy="312" rx="120" ry="22" fill="#ecf0d8" opacity="0.28"/>
  <ellipse cx="420" cy="320" rx="80" ry="14" fill="#fbf7ec" opacity="0.18"/>

  <!-- Tiny bubbles on foam — speckle -->
  <g fill="#fbf7ec" opacity="0.6">
    <circle cx="320" cy="318" r="2"/>
    <circle cx="360" cy="324" r="1.5"/>
    <circle cx="395" cy="312" r="2.5"/>
    <circle cx="430" cy="320" r="1.8"/>
    <circle cx="465" cy="316" r="2"/>
    <circle cx="490" cy="324" r="1.4"/>
    <circle cx="345" cy="330" r="1.2"/>
    <circle cx="410" cy="328" r="1.6"/>
    <circle cx="450" cy="330" r="1.2"/>
  </g>

  <!-- Rim highlight (front-facing edge of bowl) -->
  <path d="M 180 320
           Q 200 308 240 302
           L 560 302
           Q 600 308 620 320
           L 620 326
           Q 600 314 560 308
           L 240 308
           Q 200 314 180 326 Z"
        fill="url(#rimHighlight)"/>

  <!-- Soft side highlight for ceramic glaze suggestion -->
  <path d="M 200 360
           Q 195 480 230 580"
        stroke="#fbf7ec" stroke-opacity="0.25" stroke-width="3" fill="none"/>
</svg>
